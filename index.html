<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Auren</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(circle at 20% 30%, #1a1a40, #0d0d1f 70%);
    }

    /* 🌌 Animated stars */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
      animation: moveStars 100s linear infinite;
      opacity: 0.3;
    }

    @keyframes moveStars {
      from { transform: translate(0, 0); }
      to { transform: translate(-500px, -500px); }
    }

    /* ✨ Glass card */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      padding: 50px 35px;
      border-radius: 20px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.8em;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.05em;
      line-height: 1.7;
      opacity: 0.9;
    }

    /* 🌟 Button */
    a {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 30px;
      background: linear-gradient(135deg, #7f5af0, #2cb67d);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(127, 90, 240, 0.5);
    }

    a:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 30px rgba(127, 90, 240, 0.7);
    }

    footer {
      margin-top: 25px;
      font-size: 0.85em;
      opacity: 0.6;
    }

    /* 📱 Mobile tweaks */
    @media (max-width: 500px) {
      .card {
        padding: 35px 25px;
      }

      h1 {
        font-size: 2.2em;
      }
    }

  </style>
</head>

<body>

  <div class="card">
    <h1>Auren</h1>

    <p>
      Welcome to the official page of <strong>Auren</strong>.<br>
      We craft simple, useful, and delightful mobile experiences.
    </p>

    <a href="privacy-policy.html">Privacy Policy</a>

    <footer>
      © 2026 Auren
    </footer>
  </div>

</body>
</html>
