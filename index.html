<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Auren</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #5b6ee1;
      --bg2: #6d4cb3;
      --bg3: #8b5cf6;
      --bg4: #2b1f56;

      --card-bg: rgba(14, 12, 35, 0.34);
      --card-border: rgba(255, 255, 255, 0.14);
      --card-highlight: rgba(255, 255, 255, 0.08);

      --text-main: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.86);
      --text-faint: rgba(255, 255, 255, 0.68);

      --button-bg: rgba(255, 255, 255, 0.96);
      --button-text: #5a4fcf;

      --shadow-deep: rgba(0, 0, 0, 0.42);
      --shadow-soft: rgba(112, 83, 197, 0.24);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
      font-family: "Poppins", Arial, Helvetica, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.12), transparent 18%),
        radial-gradient(circle at 80% 18%, rgba(173,216,255,0.10), transparent 20%),
        radial-gradient(circle at 72% 80%, rgba(255,255,255,0.08), transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
      background-size: 220% 220%;
      animation: gradientShift 18s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ambient light */
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06), transparent 42%),
        radial-gradient(circle at 30% 75%, rgba(170,130,255,0.08), transparent 24%),
        radial-gradient(circle at 75% 25%, rgba(120,170,255,0.08), transparent 28%);
      filter: blur(30px);
    }

    body::after {
      background-image:
        radial-gradient(2px 2px at 12% 24%, rgba(255,255,255,0.72), transparent 60%),
        radial-gradient(1.8px 1.8px at 27% 68%, rgba(255,255,255,0.60), transparent 60%),
        radial-gradient(2px 2px at 81% 21%, rgba(255,255,255,0.66), transparent 60%),
        radial-gradient(1.6px 1.6px at 73% 72%, rgba(255,255,255,0.58), transparent 60%),
        radial-gradient(2px 2px at 56% 39%, rgba(255,255,255,0.48), transparent 60%),
        radial-gradient(1.5px 1.5px at 39% 84%, rgba(255,255,255,0.52), transparent 60%),
        radial-gradient(1.6px 1.6px at 65% 14%, rgba(255,255,255,0.48), transparent 60%);
      opacity: 0.9;
      animation: twinkle 6s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from {
        opacity: 0.45;
        transform: scale(1);
      }
      to {
        opacity: 0.95;
        transform: scale(1.015);
      }
    }

    .shooting-stars {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .shooting-stars span {
      position: absolute;
      top: -15%;
      width: 2px;
      height: 110px;
      border-radius: 999px;
      background: linear-gradient(-45deg, rgba(255,255,255,0.96), rgba(255,255,255,0));
      filter: blur(0.4px);
      opacity: 0;
      animation: shootingStar 8.5s linear infinite;
    }

    .shooting-stars span:nth-child(1) {
      left: 16%;
      animation-delay: 0s;
      height: 90px;
    }

    .shooting-stars span:nth-child(2) {
      left: 46%;
      animation-delay: 2.4s;
      height: 120px;
    }

    .shooting-stars span:nth-child(3) {
      left: 72%;
      animation-delay: 5.1s;
      height: 100px;
    }

    .shooting-stars span:nth-child(4) {
      left: 88%;
      animation-delay: 6.8s;
      height: 80px;
    }

    @keyframes shootingStar {
      0% {
        transform: translate3d(0, 0, 0) rotate(45deg);
        opacity: 0;
      }
      8% {
        opacity: 1;
      }
      28% {
        opacity: 1;
      }
      65% {
        transform: translate3d(-360px, 700px, 0) rotate(45deg);
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
      padding: 52px 38px 40px;
      text-align: center;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 30px 80px var(--shadow-deep),
        0 0 50px var(--shadow-soft),
        inset 0 1px 0 var(--card-highlight);
      animation: cardEnter 1s ease, cardFloat 7s ease-in-out infinite;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.10), transparent 30%, transparent 70%, rgba(255,255,255,0.04));
      pointer-events: none;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Optional logo area */
    .logo {
      margin: 0 auto 20px;
      display: flex;
      justify-content: center;
    }

    .logo img {
      max-width: 92px;
      max-height: 92px;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      filter:
        drop-shadow(0 10px 22px rgba(0,0,0,0.28))
        drop-shadow(0 0 14px rgba(255,255,255,0.10));
    }

    h1 {
      font-size: clamp(2.5rem, 4vw, 3.5rem);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 0.4px;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #ffffff, #efebff, #d7d1ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 22px rgba(255,255,255,0.08);
    }

    .subtitle {
      max-width: 500px;
      margin: 0 auto;
      font-size: 1.06rem;
      line-height: 1.9;
      color: var(--text-soft);
      font-weight: 400;
    }

    .actions {
      margin-top: 30px;
    }

    .privacy-link {
      display: inline-block;
      padding: 13px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: var(--button-text);
      background: var(--button-bg);
      box-shadow:
        0 12px 30px rgba(0,0,0,0.22),
        0 0 20px rgba(255,255,255,0.06);
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .privacy-link:hover {
      transform: translateY(-2px);
      box-shadow:
        0 16px 34px rgba(0,0,0,0.28),
        0 0 24px rgba(255,255,255,0.10);
      background: #ffffff;
    }

    footer {
      margin-top: 26px;
      font-size: 0.92rem;
      color: var(--text-faint);
      letter-spacing: 0.2px;
    }

    @media (max-width: 640px) {
      .card {
        padding: 42px 24px 34px;
        border-radius: 22px;
      }

      .logo img {
        max-width: 78px;
        max-height: 78px;
      }

      .subtitle {
        font-size: 1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      body::after,
      .shooting-stars span,
      .card {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="shooting-stars">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="card">
    <!-- Optional logo: remove this whole block if you don't want a logo yet -->
    <!--
    <div class="logo">
      <img src="logo.png" alt="Auren logo">
    </div>
    -->

    <h1>Auren</h1>

    <p class="subtitle">
      We design mobile apps that feel simple, helpful, and genuinely enjoyable to use — every day.
    </p>

    <div class="actions">
      <a class="privacy-link" href="privacy-policy.html">View Privacy Policy</a>
    </div>

    <footer>Made with care · © 2026 Auren</footer>
  </div>
</body>
</html>
