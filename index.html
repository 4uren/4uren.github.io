<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Auren</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #8ec5fc;
      --bg2: #e0c3fc;
      --bg3: #f9c5d1;
      --card: rgba(255, 255, 255, 0.18);
      --card-border: rgba(255, 255, 255, 0.35);
      --text-main: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.92);
      --shadow: rgba(91, 61, 145, 0.20);
      --privacy-bg: rgba(255, 255, 255, 0.22);
      --privacy-hover: rgba(255, 255, 255, 0.32);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.35) 0, transparent 22%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,0.18) 0, transparent 18%),
        radial-gradient(circle at 75% 80%, rgba(255,255,255,0.15) 0, transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 55%, var(--bg3));
      background-size: 200% 200%;
      animation: gradientMove 14s ease infinite;
    }

    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(2px 2px at 80% 20%, rgba(255,255,255,0.75), transparent 60%),
        radial-gradient(1.5px 1.5px at 70% 70%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(2px 2px at 35% 80%, rgba(255,255,255,0.65), transparent 60%),
        radial-gradient(1.5px 1.5px at 55% 45%, rgba(255,255,255,0.65), transparent 60%);
      animation: twinkle 6s ease-in-out infinite alternate;
      opacity: 0.75;
    }

    body::after {
      background: radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 55%);
      filter: blur(28px);
    }

    @keyframes twinkle {
      from { opacity: 0.45; transform: scale(1); }
      to   { opacity: 0.95; transform: scale(1.02); }
    }

    /* 🌠 Shooting stars */
    .shooting-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .shooting-stars span {
      position: absolute;
      top: -10%;
      width: 2px;
      height: 80px;
      background: linear-gradient(-45deg, white, rgba(255,255,255,0));
      opacity: 0.8;
      border-radius: 50px;
      filter: blur(0.5px);
      animation: shooting 7s linear infinite;
    }

    .shooting-stars span:nth-child(1) {
      left: 20%;
      animation-delay: 0s;
    }

    .shooting-stars span:nth-child(2) {
      left: 50%;
      animation-delay: 2s;
    }

    .shooting-stars span:nth-child(3) {
      left: 75%;
      animation-delay: 4s;
    }

    @keyframes shooting {
      0% {
        transform: translateY(0) translateX(0) rotate(45deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      70% {
        transform: translateY(600px) translateX(-300px) rotate(45deg);
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 1; /* 👈 important so it's above stars */
      width: 100%;
      max-width: 620px;
      padding: 44px 34px;
      text-align: center;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      box-shadow:
        0 20px 60px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.22);
      animation: floatIn 0.9s ease, floatIdle 6s ease-in-out infinite;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .logo-glow {
      width: 76px;
      height: 76px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.9rem;
      font-weight: 700;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #fef6ff, #e7dbff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin-top: 10px;
      line-height: 1.9;
      color: var(--text-soft);
    }

    .actions {
      margin-top: 30px;
    }

    .privacy-link {
      padding: 12px 20px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: var(--privacy-bg);
    }

    footer {
      margin-top: 28px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- ✅ THIS is where shooting stars go -->
  <div class="shooting-stars">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="card">
    <div class="logo-glow">A</div>

    <h1>Auren</h1>

    <p class="subtitle">
      We design mobile apps that feel simple, helpful, and genuinely enjoyable to use — every day.
    </p>

    <div class="actions">
      <a class="privacy-link" href="privacy-policy.html">Privacy Policy</a>
    </div>

    <footer>Made with care · © 2026 Auren</footer>
  </div>

</body>
</html>
