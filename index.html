<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Auren</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #667eea;
      --bg2: #764ba2;
      --bg3: #8b5cf6;
      --card-bg: rgba(10, 10, 30, 0.28);
      --card-border: rgba(255, 255, 255, 0.14);
      --text-main: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.9);
      --button-bg: rgba(255, 255, 255, 0.96);
      --button-text: #5a4fcf;
      --shadow: rgba(0, 0, 0, 0.32);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      font-family: "Poppins", Arial, Helvetica, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.14) 0, transparent 20%),
        radial-gradient(circle at 85% 18%, rgba(255,255,255,0.08) 0, transparent 18%),
        radial-gradient(circle at 75% 80%, rgba(255,255,255,0.08) 0, transparent 22%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 180% 180%;
      animation: gradientMove 16s ease infinite;
      position: relative;
    }

    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background-image:
        radial-gradient(2px 2px at 12% 24%, rgba(255,255,255,0.75), transparent 60%),
        radial-gradient(1.8px 1.8px at 28% 68%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(2px 2px at 82% 22%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 73% 72%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(2px 2px at 55% 40%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(1.5px 1.5px at 40% 84%, rgba(255,255,255,0.55), transparent 60%);
      opacity: 0.8;
      animation: twinkle 5s ease-in-out infinite alternate;
    }

    body::after {
      background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
      filter: blur(30px);
    }

    @keyframes twinkle {
      from {
        opacity: 0.45;
        transform: scale(1);
      }
      to {
        opacity: 0.95;
        transform: scale(1.02);
      }
    }

    .shooting-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .shooting-stars span {
      position: absolute;
      top: -12%;
      width: 2px;
      height: 90px;
      background: linear-gradient(-45deg, rgba(255,255,255,0.95), rgba(255,255,255,0));
      border-radius: 999px;
      filter: blur(0.4px);
      opacity: 0;
      animation: shooting 7.5s linear infinite;
    }

    .shooting-stars span:nth-child(1) {
      left: 18%;
      animation-delay: 0s;
    }

    .shooting-stars span:nth-child(2) {
      left: 52%;
      animation-delay: 2.3s;
      height: 75px;
    }

    .shooting-stars span:nth-child(3) {
      left: 78%;
      animation-delay: 4.8s;
      height: 100px;
    }

    @keyframes shooting {
      0% {
        transform: translateY(0) translateX(0) rotate(45deg);
        opacity: 0;
      }
      8% {
        opacity: 1;
      }
      35% {
        opacity: 1;
      }
      70% {
        transform: translateY(620px) translateX(-320px) rotate(45deg);
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      padding: 44px 34px;
      text-align: center;
      border-radius: 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 24px 50px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: floatIn 0.9s ease, floatIdle 6s ease-in-out infinite;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes floatIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    h1 {
      margin-top: 0;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--text-soft);
      max-width: 470px;
      margin: 0 auto;
    }

    a {
      display: inline-block;
      margin-top: 28px;
      padding: 13px 24px;
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.26);
      background: #ffffff;
    }

    footer {
      margin-top: 26px;
      font-size: 0.92rem;
      opacity: 0.82;
      letter-spacing: 0.2px;
    }

    @media (max-width: 560px) {
      .card {
        padding: 34px 24px;
        border-radius: 18px;
      }

      .logo-mark {
        width: 64px;
        height: 64px;
        font-size: 1.6rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="shooting-stars">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="card">

    <h1>Auren</h1>

    <p>
      We design mobile apps that feel simple, helpful, and genuinely enjoyable to use — every day.
    </p>

    <a href="privacy-policy.html">Privacy Policy</a>

    <footer>Made with care · © 2026 Auren</footer>
  </div>
</body>
</html>
