<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Auren</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #667eea;
      --bg2: #764ba2;
      --bg3: #8a63d2;
      --card-bg: rgba(12, 10, 28, 0.24);
      --card-border: rgba(255, 255, 255, 0.14);
      --text-main: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.9);
      --button-bg: rgba(255, 255, 255, 0.96);
      --button-text: #5a4fcf;
      --shadow: rgba(0, 0, 0, 0.32);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
      font-family: "Poppins", Arial, Helvetica, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.12) 0, transparent 20%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,0.07) 0, transparent 18%),
        radial-gradient(circle at 75% 80%, rgba(255,255,255,0.06) 0, transparent 22%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 180% 180%;
      animation: gradientMove 14s ease infinite;
    }

    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background-image:
        radial-gradient(2px 2px at 12% 25%, rgba(255,255,255,0.78), transparent 60%),
        radial-gradient(1.8px 1.8px at 28% 68%, rgba(255,255,255,0.62), transparent 60%),
        radial-gradient(2px 2px at 82% 22%, rgba(255,255,255,0.72), transparent 60%),
        radial-gradient(1.5px 1.5px at 73% 72%, rgba(255,255,255,0.56), transparent 60%),
        radial-gradient(2px 2px at 55% 40%, rgba(255,255,255,0.48), transparent 60%),
        radial-gradient(1.5px 1.5px at 40% 84%, rgba(255,255,255,0.5), transparent 60%);
      opacity: 0.8;
      animation: twinkle 5s ease-in-out infinite alternate;
    }

    body::after {
      background: radial-gradient(circle at center, rgba(255,255,255,0.07), transparent 60%);
      filter: blur(26px);
    }

    @keyframes twinkle {
      from {
        opacity: 0.45;
        transform: scale(1);
      }
      to {
        opacity: 0.92;
        transform: scale(1.02);
      }
    }

    .shooting-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .shooting-stars span {
      position: absolute;
      top: -12%;
      width: 2px;
      height: 90px;
      background: linear-gradient(-45deg, rgba(255,255,255,0.95), rgba(255,255,255,0));
      border-radius: 999px;
      filter: blur(0.4px);
      opacity: 0;
      animation: shooting 8s linear infinite;
    }

    .shooting-stars span:nth-child(1) {
      left: 18%;
      animation-delay: 0s;
    }

    .shooting-stars span:nth-child(2) {
      left: 52%;
      animation-delay: 2.8s;
      height: 75px;
    }

    .shooting-stars span:nth-child(3) {
      left: 78%;
      animation-delay: 5.2s;
      height: 100px;
    }

    @keyframes shooting {
      0% {
        transform: translateY(0) translateX(0) rotate(45deg);
        opacity: 0;
      }
      8% {
        opacity: 1;
      }
      30% {
        opacity: 1;
      }
      68% {
        transform: translateY(620px) translateX(-320px) rotate(45deg);
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      padding: 46px 34px 38px;
      text-align: center;
      border-radius: 22px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 24px 48px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: floatIn 0.9s ease, floatIdle 6s ease-in-out infinite;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes floatIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Optional logo */
    .logo {
      margin: 0 auto 18px;
      display: flex;
      justify-content: center;
    }

    .logo img {
      max-width: 84px;
      max-height: 84px;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
      filter:
        drop-shadow(0 10px 20px rgba(0,0,0,0.25))
        drop-shadow(0 0 12px rgba(255,255,255,0.08));
    }

    h1 {
      margin-bottom: 14px;
      font-size: clamp(2.4rem, 4vw, 3.1rem);
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0.4px;
      background: linear-gradient(135deg, #ffffff, #ece8ff, #d9d2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      max-width: 470px;
      margin: 0 auto;
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--text-soft);
    }

    a {
      display: inline-block;
      margin-top: 28px;
      padding: 13px 24px;
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.2px;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.26);
      background: #ffffff;
    }

    footer {
      margin-top: 26px;
      font-size: 0.92rem;
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.2px;
    }

    @media (max-width: 560px) {
      .card {
        padding: 36px 24px 30px;
        border-radius: 18px;
      }

      .logo img {
        max-width: 72px;
        max-height: 72px;
      }

      p {
        font-size: 1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      body::before,
      .shooting-stars span,
      .card {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="shooting-stars">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="card">

    <h1>Auren</h1>

    <p>
      We design mobile apps that feel simple, helpful, and genuinely enjoyable to use — every day.
    </p>

    <a href="privacy-policy.html">View Privacy Policy</a>

    <footer>Made with care · © 2026 Auren</footer>
  </div>
</body>
</html>
